{% extends 'dashboardbase.html' %}
{% block content %}
<div class="container mt-4">


    <div class="card shadow-sm border-0 rounded-3">

        <!-- Header -->
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Add Category</h5>
        </div>

        <!-- Body -->
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    <!-- Icon Upload -->
                    <div class="col-md-4 text-center">
                        <label class="form-label fw-semibold">Category Icon</label>

                        <div class="border rounded p-3 mb-3"
                            style="height:200px; display:flex; align-items:center; justify-content:center;">
                            <img id="preview" src="" style="max-height: 100%; max-width:100%; object-fit:cover;">
                        </div>

                        <input type="file" name="icon" class="form-control" onchange="previewImage(event)" required>
                    </div>

                    <!-- Content Fields -->
                    <div class="col-md-8">

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category Title</label>
                            <input type="text" name="title" class="form-control" placeholder="Enter category title..."
                                required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="3"
                                placeholder="Enter category description..." required></textarea>
                        </div>

                        <!-- Badge -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Badge</label>
                            <input type="text" name="badge" class="form-control" placeholder="e.g. Trending, Popular">
                        </div>

                        <!-- Tags -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tags</label>
                            <input type="text" name="tags" class="form-control"
                                placeholder="e.g. Repair, Cleaning, Plumbing">
                            <small class="text-muted">Enter comma separated values</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Service Page  Description</label>
                            <textarea name="category_about_des" class="form-control" rows="5"
                                placeholder="Enter Service page description..." ></textarea>
                        </div>

                        <div class="row">

                            <!-- Service About Image -->
                            <div class="col-md-6 text-left">
                                <label class="form-label fw-semibold">Service About Image</label>

                                <div class="border rounded p-3 mb-3"
                                    style="height:200px; display:flex; align-items:center; justify-content:center;">
                                    <img id="about_preview" src=""
                                        style="max-height: 100%; max-width:100%; object-fit:cover;">
                                </div>

                                <input type="file" name="category_about_img" class="form-control"
                                    onchange="previewImage(event, 'about_preview')" >
                            </div>

                            <!-- Banner Image -->
                            <div class="col-md-6 text-left">
                                <label class="form-label fw-semibold">Banner Image</label>

                                <div class="border rounded p-3 mb-3"
                                    style="height:200px; display:flex; align-items:center; justify-content:center;">
                                    <img id="banner_preview" src=""
                                        style="max-height: 100%; max-width:100%; object-fit:cover;">
                                </div>

                                <input type="file" name="banner_image" class="form-control"
                                    onchange="previewImage(event, 'banner_preview')" >
                            </div>

                        </div>


                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-3">
                    <a href="{% url 'list.category' %}" class="btn btn-outline-success">
                        Back
                    </a>

                    <button type="submit" class="btn btn-primary px-4">
                        Save Category
                    </button>
                </div>

            </form>

        </div>

    </div>


</div>

<!-- Image Preview Script -->

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

{% endblock %}

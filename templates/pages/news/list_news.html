{% extends 'dashboardbase.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0 rounded-3">

        <!-- Header -->
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">News List</h5>
            <a href="{% url 'createnews' %}" class="btn btn-sm btn-light">
               <i class="bi bi-plus-circle-fill"></i> Add News
            </a>
        </div>

        <!-- Table -->
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover align-middle">

                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Headline</th>
                            <th>created Date</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for news in news %}
                        <tr>
                            <td>{{ forloop.counter }}</td>
                           
                            <td>
                                {{ news.content|truncatewords:10 }}
                            </td>
                            <td>{{ news.created_at|date:"d M Y" }}</td>

                            <td class="text-center">
                                <a href="{% url 'update.news' news.pk %}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <a href="{% url 'delete.news' news.pk %}" class="btn btn-sm btn-danger">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </td>
                        </tr>

                        {% empty %}
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">
                                No news available
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>

{% endblock %}

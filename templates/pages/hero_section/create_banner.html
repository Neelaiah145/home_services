{% extends "base.html" %}

{% block content %}



<div class="banner-page">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h5 class="fw-bold mb-0">

                Banner Management

            </h5>

            <p class="page-subtitle">

                Create and manage homepage banners

            </p>

        </div>

        <div class="badge-count">

            Add Banner

        </div>

    </div>

    <!-- CARD -->

    <div class="banner-card">

        <!-- TOP -->

        <div class="card-top">

            <div>

                <h5 class="card-title">

                    Banner Information

                </h5>

                <p class="card-desc">

                    Upload banner image and enter banner details

                </p>

            </div>

        </div>

        <!-- BODY -->

        <div class="card-body-custom">

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <div class="row g-4">

                    <!-- IMAGE -->

                    <div class="col-md-4">

                        <label class="form-label">

                            Upload Image

                        </label>

                        <div class="image-upload-box">

                            <img id="preview"
                                 src=""
                                 alt="Preview">

                        </div>

                        <input type="file"
                               name="image"
                               class="file-input"
                               onchange="previewImage(event)"
                               required>

                    </div>

                    <!-- CONTENT -->

                    <div class="col-md-8">

                        <!-- HEADING -->

                        <div class="mb-4">

                            <label class="form-label">

                                Heading

                            </label>

                            <input type="text"
                                   name="heading"
                                   class="form-control-custom"
                                   placeholder="Enter main heading..."
                                   required>

                        </div>

                        <!-- SUB HEADING -->

                        <div>

                            <label class="form-label">

                                Sub Heading

                            </label>

                            <input type="text"
                                   name="sub_heading"
                                   class="form-control-custom"
                                   placeholder="Enter sub heading..."
                                   required>

                        </div>

                    </div>

                </div>

                <!-- BUTTONS -->

                <div class="form-actions">

                    <a href="{% url 'list.banner' %}"
                       class="back-btn">

                        Back

                    </a>

                    <button type="submit"
                            class="save-btn">

                        Save Banner

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- IMAGE PREVIEW -->

<script>

function previewImage(event){

    const reader = new FileReader();

    reader.onload = function(){

        document.getElementById(
            'preview'
        ).src = reader.result;

    }

    reader.readAsDataURL(
        event.target.files[0]
    );

}

</script>

{% endblock %}

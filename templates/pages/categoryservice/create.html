{% extends 'dashboardbase.html' %}
{% block content %}
<div class="container mt-4">

    <div class="card shadow-sm border-0 rounded-3">

        <!-- Header -->
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Add Services</h5>
        </div>

        <!-- Body -->
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    <!-- Image Upload -->
                      <div class="col-md-4 text-center">
                        <label class="form-label fw-semibold">Service About Image</label>

                        <div class="border rounded p-3 mb-3"
                            style="height:200px; display:flex; align-items:center; justify-content:center;">
                            <img id="preview" src=""
                                style="max-height: 100%; max-width:100%; object-fit:cover;">
                        </div>

                        <input type="file" name="image" class="form-control" onchange="previewImage(event)" required>
                    </div>

                    <!-- Content Fields -->
                    <div class="col-md-8">

                        <!-- Category Dropdown -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Select Category</label>
                            <select name="category" class="form-control" required>
                                <option value="">-- Select Category --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                         <div class="mb-3">
                            <label class="form-label fw-semibold">Service Tag</label>
                            <input type="text" name="s_tag" class="form-control" required>
                        </div>

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Service Title</label>
                            <input type="text" name="s_title" class="form-control" required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Short Description</label>
                            <textarea name="s_desc" class="form-control" rows="3" required></textarea>
                        </div>

                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-3">
                    <a href="{% url 'list.category.services' %}" class="btn btn-outline-success">
                        Back
                    </a>

                    <button type="submit" name="save_add_more" class="btn btn-primary px-4">
                        Save & Add More
                    </button>

                    <button type="submit" name="save" class="btn btn-success px-4">
                        Save
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>
<!-- Image Preview Script -->

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}

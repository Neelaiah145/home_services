{% extends 'dashboardbase.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0 rounded-3">

        <!-- Header -->
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Update Job / Career</h5>
        </div>

        <!-- Body -->
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    <!-- ICON -->
                    <div class="col-md-4 text-center">

                        <label class="form-label fw-semibold">Job Icon</label>

                        <div class="border rounded p-3 mb-3"
                            style="height:200px; display:flex; align-items:center; justify-content:center;">

                            {% if job.icon %}
                            <img id="preview" src="{{ job.icon.url }}"
                                style="max-height:100%; max-width:100%; object-fit:cover;">
                            {% else %}
                            <img id="preview" src="" style="max-height:100%; max-width:100%; object-fit:cover;">
                            {% endif %}

                        </div>

                        <input type="file" name="icon" class="form-control" onchange="previewImage(event)">
                        <small class="text-muted">Leave empty to keep old image</small>

                    </div>

                    <!-- CONTENT -->
                    <div class="col-md-8">

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Job Title</label>
                            <input type="text" name="title" class="form-control" value="{{ job.title }}" required>
                        </div>

                        <!-- Badge -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Badge</label>
                            <select name="status" class="form-control">
                                <option value="hiring" {% if job.status == "hiring" %}selected{% endif %}>Hiring</option>
                                <option value="urgent" {% if job.status == "urgent" %}selected{% endif %}>Urgent</option>
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea name="description" class="form-control" rows="3"
                                required>{{ job.description }}</textarea>
                        </div>

                        <!-- Job Type -->
                          <div class="mb-3">
                            <label class="form-label">Job Type</label>
                            <select name="job_type" class="form-control">
                                <option value="full_time" {% if job.job_type == "full_time" %}selected{% endif %}>Full-time</option>
                                <option value="part_time" {% if job.job_type == "part_time" %}selected{% endif %}>Part-time</option>
                                <option value="contract" {% if job.job_type == "contract" %}selected{% endif %}>Contract</option>
                            </select>
                        </div>

                        <!-- Location -->
                          <div class="mb-3">
                            <label class="form-label">Work Mode</label>
                            <select name="work_mode" class="form-control">
                                <option value="on_site" {% if job.work_mode == "on_site" %}selected{% endif %}>On-site</option>
                                <option value="residential" {% if job.work_mode == "residential" %}selected{% endif %}>Residential</option>
                                <option value="remote" {% if job.work_mode == "remote" %}selected{% endif %}>Remote</option>
                            </select>
                        </div>



                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-3">

                    <a href="{% url 'list.jobs' %}" class="btn btn-outline-success">
                        Back
                    </a>

                    <button type="submit" class="btn btn-warning px-4">
                        Update Job
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- Image Preview -->
<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

{% endblock %}

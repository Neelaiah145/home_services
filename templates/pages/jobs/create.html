{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0 rounded-3">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0 text-white">Create Job</h5>
        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    <!-- ICON -->
                    <div class="col-md-4 text-center">

                        <label class="form-label fw-semibold">Job Icon</label>

                        <div class="border rounded p-3 mb-3"
                            style="height:200px; display:flex; align-items:center; justify-content:center;">
                            <img id="preview" style="max-height:100%; max-width:100%; object-fit:cover;">
                        </div>

                        <input type="file" name="icon" class="form-control" onchange="previewImage(event)">
                    </div>

                    <!-- FIELDS -->
                    <div class="col-md-8">

                     

                   

                        <div class="mb-3">
                            <label class="form-label">Job Title</label>
                            <input type="text" name="title" class="form-control" placeholder="eg: cook,maid,driver" required>
                        </div>

                    
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="Enter job description" required></textarea>
                        </div>

                        <!-- STATUS -->
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-control">
                                <option value="hiring">Hiring</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>

                        <!-- JOB TYPE -->
                        <div class="mb-3">
                            <label class="form-label">Job Type</label>
                            <select name="job_type" class="form-control">
                                <option value="full_time">Full-time</option>
                                <option value="part_time">Part-time</option>
                                <option value="contract">Contract</option>
                            </select>
                        </div>

                        <!-- WORK MODE -->
                        <div class="mb-3">
                            <label class="form-label">Work Mode</label>
                            <select name="work_mode" class="form-control">
                                <option value="on_site">On-site</option>
                                <option value="residential">Residential</option>
                                <option value="remote">Remote</option>
                            </select>
                        </div>



                    </div>

                </div>

                <div class="d-flex justify-content-between mt-3">
                   <a href="{% url 'list.jobs' %}" class="btn btn-outline-success">Back</a>

                    <button type="submit" class="btn btn-primary px-4">
                        Save Job
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<!-- IMAGE PREVIEW -->
<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('preview').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

{% endblock %}

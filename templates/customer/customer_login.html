{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Secure Login</title>
  <style>
    :root {
      --primary: #6c5ce7;
      --primary-light: #f4f3ff;
      --text: #2d3436;
      --border: #dfe6e9;
      --error: #ff7675;
      --success: #00b894;
      --gray: #636e72;
    }

    * {
      box-sizing: border-box;
    }

    /*  BACKGROUND BASE */
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;

      background: linear-gradient(rgba(15, 32, 39, 0.75), rgba(44, 83, 100, 0.75)),
      url("{% static 'assets/images/bg/login_bg.webp' %}");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-size: 300% 300%;
      animation: aurora 10s ease infinite;
    }



    @keyframes float {
      0% {
        transform: translateY(0px) translateX(0px);
      }

      50% {
        transform: translateY(40px) translateX(30px);
      }

      100% {
        transform: translateY(0px) translateX(0px);
      }
    }

    /*  GLASS CARD */
    .card {
      position: relative;
      z-index: 1;

      width: 100%;
      max-width: 400px;

      padding: 35px;

      border-radius: 24px;

      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border: 1px solid rgba(255, 255, 255, 0.2);

      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.2),
        inset 0 0 10px rgba(255, 255, 255, 0.1);

      transition: 0.3s ease;
    }

    /*  HOVER LIFT */
    .card:hover {
      transform: translateY(-5px) scale(1.01);
    }

    /* 🧾 TEXT */
    h2 {
      color: #fff;
      text-align: center;
    }

    .subtitle {
      color: #dfe6e9;
    }

    /*  INPUT */
    .phone-container,
    input,
    .otp-box {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    input::placeholder {
      color: rgba(0, 0, 0, 0.7);
    }

    /*  BUTTON */
    #btn {
      width: 100%;
      padding: 16px;

      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;

      border: none;
      border-radius: 14px;

      font-size: 16px;
      font-weight: 600;

      cursor: pointer;

      box-shadow: 0 6px 20px rgba(0, 114, 255, 0.4);
      transition: 0.3s;
    }

    #btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 114, 255, 0.6);
    }


    h2 {
      text-align: center;
      margin: 0 0 10px;
      color: black;
      font-size: clamp(20px, 5vw, 24px);
    }

    p.subtitle {
      text-align: center;
      color: #ffffff;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* Input Labels */
    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
      display: block;
    }

    /* Phone Input Group */
    .phone-container {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      position: relative;
      background: #fff;
      margin-bottom: 25px;
      /* Spacing between Phone and OTP */
    }

    .phone-container:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
    }

    .selected-country {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      min-width: 85px;
      justify-content: center;
    }

    .flag-img {
      width: 20px;
      height: 14px;
      border-radius: 2px;
      object-fit: cover;
    }

    /* Dropdown Menu */
    .country-dropdown {
      position: absolute;
      top: 55px;
      left: 0;
      width: 100%;
      max-width: 250px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      z-index: 100;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .country-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 15px;
      cursor: pointer;
      font-size: 14px;
    }

    .country-item:hover {
      background: var(--primary-light);
    }

    input#phone {
      flex: 1;
      border: none;
      padding: 12px;
      font-size: 16px;
      outline: none;
      background: transparent;
      width: 100%;
      color: black !important;
    }

    /* OTP Section */
    .otp-wrap {
      display: none;
      margin-top: 10px;
      padding-top: 20px;
      border-top: 1px dashed var(--border);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .otp-grid {
      display: flex;
      gap: clamp(8px, 2vw, 12px);
      justify-content: center;
      margin: 20px 0;
    }

    .otp-box {
      width: clamp(45px, 12vw, 52px);
      height: 60px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      border: 2px solid var(--border);
      border-radius: 12px;
      outline: none;
    }

    .otp-box:focus {
      border-color: var(--primary);
      background: orange;
    }

    /* Actions */
    .timer-row {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 20px;
      text-align: center;
    }

    #resendBtn {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      display: none;
    }

    #btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #f3f4f6;
      font-size: 14px;
      color: var(--gray);
    }

    .footer a {
      color: black;
      text-decoration: none;
      font-weight: 700;
    }

    /* Tab & Mobile Responsiveness */
    @media (max-width: 480px) {
      .card {
        padding: 25px 20px;
      }

      .selected-country {
        min-width: 75px;
        padding: 10px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <form method="POST" style="display:none;">
      {% csrf_token %}
    </form>
    <h2>Sign In</h2>
    <p class="subtitle">Access your account securely</p>

    <p id="msg" class="msg" style="font-weight: 700"></p>

    <label class="input-label">Mobile Number</label>
    <div class="phone-container">
      <div class="selected-country" id="dropdownTrigger">
        <img src="/static/assets/images/india_flg.webp" class="flag-img" id="mainFlag">
        <span id="mainCode " style="color: black;">+91</span>
      </div>

      <div class="country-dropdown" id="countryMenu">
        <div class="country-item" onclick="selectCountry('in', '+91')"><img src="" class="flag-img"> India (+91)</div>
        <div class="country-item" onclick="selectCountry('us', '+1')"><img src="" class="flag-img"> USA (+1)</div>
        <div class="country-item" onclick="selectCountry('gb', '+44')"><img src="" class="flag-img"> UK (+44)</div>
      </div>

      <input id="phone" type="tel" placeholder="10 Digit Number" maxlength="10">
    </div>

    <div class="otp-wrap" id="otpWrap">
      <label class="input-label" style="text-align: center;">Verification Code</label>
      <div class="otp-grid">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric">
      </div>
      <div class="timer-row">
        <span id="tText">Resend in <b id="timer">30</b>s</span>
        <button id="resendBtn" type="button">Resend Code</button>
      </div>
    </div>

    <button id="btn">Send OTP</button>

    <div class="footer">
      <span style="color: #fff;">New here? </span><a href="/register/">Create Account</a>
    </div>
  </div>


  <script>

    const NEXT_URL = "{{ next|default:'' }}";

    let step = 1;

    const btn = document.getElementById("btn");
    const phoneInput = document.getElementById("phone");
    const otpWrap = document.getElementById("otpWrap");
    const boxes = document.querySelectorAll(".otp-box");
    const msg = document.getElementById("msg");

    function getCSRF() {
      return document.cookie.split('; ')
        .find(r => r.startsWith('csrftoken='))?.split('=')[1];
    }

    function showMsg(text, type) {
      msg.innerText = text;
      msg.style.color = type === "error" ? "red" : "green";
    }

    // ✅ AUTO MOVE OTP
    boxes.forEach((box, index) => {

      box.addEventListener("input", function () {

        this.value = this.value.replace(/[^0-9]/g, "");

        if (this.value && index < boxes.length - 1) {
          boxes[index + 1].focus();
        }
      });

      box.addEventListener("keydown", function (e) {
        if (e.key === "Backspace" && !this.value && index > 0) {
          boxes[index - 1].focus();
        }
      });

    });

    btn.onclick = async function () {

      let otp = "";
      boxes.forEach(b => otp += b.value);

      // STEP 1
      if (step === 1) {

        if (phoneInput.value.length !== 10) {
          return showMsg("Enter valid phone", "error");
        }

        const res = await fetch("/login/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRF()
          },
          body: JSON.stringify({
            phone: phoneInput.value,
            next: NEXT_URL
          })
        });

        const data = await res.json();

        if (data.error) {
          if (data.redirect) {
            window.location.href = data.redirect;
          } else {
            showMsg(data.error, "error");
          }
        } else {
          showMsg("OTP sent", "success");
          otpWrap.style.display = "block";
          btn.innerText = "Verify OTP";
          phoneInput.disabled = true;
          step = 2;
        }
      }

      // STEP 2
      else {

        if (otp.length !== 4) {
          return showMsg("Enter OTP", "error");
        }

        const res = await fetch("/login/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRF()
          },
          body: JSON.stringify({
            phone: phoneInput.value,
            otp: otp,
            next: NEXT_URL
          })
        });

        const data = await res.json();

        if (data.error) {
          showMsg(data.error, "error");
        } else {
          window.location.href = data.redirect;
        }
      }
    };

  </script>
</body>

</html>

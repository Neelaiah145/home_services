<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service Detail</title>

<style>

/* ===== PAGE ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 800px;
    margin: 50px auto;
    padding: 0 15px;
}

/* ===== CARD ===== */
.card {
    background: #fff;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* ===== TITLE ===== */
h2 {
    margin-bottom: 10px;
    font-size: 24px;
}

/* ===== DESCRIPTION ===== */
.desc {
    font-size: 15px;
    color: #555;
    margin-bottom: 20px;
    line-height: 1.6;
}

/* ===== BUTTON ===== */
.btn {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

/* ===== BACK BUTTON ===== */
.back {
    display: inline-block;
    margin-bottom: 15px;
    text-decoration: none;
    color: #2563eb;
    font-size: 14px;
}

</style>

</head>

<body>

<div class="container">

<a href="/" class="back">← Back to Services</a>

<div class="card">

<h2>{{ service.name }}</h2>

<p class="desc">{{ service.description }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn">Book Now</button>
</form>

</div>

</div>

</body>
</html>

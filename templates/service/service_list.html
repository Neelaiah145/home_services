<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f5f7fb;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 15px;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.header h2 {
    font-size: 26px;
    margin: 0;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

/* ===== CARD ===== */
.card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* BODY */
.card-body {
    padding: 15px;
}

/* TITLE */
.card-body h3 {
    margin: 0 0 6px;
    font-size: 18px;
}

/* TEXT */
.card-body p {
    font-size: 14px;
    color: #555;
    margin-bottom: 12px;
}

/* BUTTON */
.btn {
    display: inline-block;
    background: #2563eb;
    color: #fff;
    padding: 8px 12px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.2s;
}

.btn:hover {
    background: #1d4ed8;
}

/* EMPTY STATE */
.empty {
    text-align: center;
    padding: 40px;
    color: #888;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .header h2 {
        font-size: 22px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>Services</h2>
    </div>

    <!-- GRID -->
    <div class="grid">

        {% for s in services %}
        <div class="card">

            {% if s.image %}
                <img src="{{ s.image.url }}" alt="{{ s.name }}">
            {% endif %}

            <div class="card-body">
                <h3>{{ s.name }}</h3>
                <p>{{ s.title }}</p>

                <a href="{% url 'service_detail' s.id %}" class="btn">
                    View Details
                </a>
            </div>

        </div>
        {% empty %}
        <div class="empty">
            No services available
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Services</title>

<style>

/* ===== PAGE ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 15px;
}

/* ===== TITLE ===== */
h2 {
    margin-bottom: 20px;
    font-size: 26px;
    font-weight: 600;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
    gap: 20px;
}

/* ===== CARD ===== */
.card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* BODY */
.card-body {
    padding: 15px;
}

/* TITLE */
.card-body h3 {
    margin: 0 0 5px;
    font-size: 18px;
}

/* TEXT */
.card-body p {
    font-size: 14px;
    color: #555;
    margin-bottom: 12px;
}

/* BUTTON */
.btn {
    display: inline-block;
    background: #2563eb;
    color: #fff;
    padding: 8px 12px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.2s;
}

.btn:hover {
    background: #1d4ed8;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    h2 {
        font-size: 22px;
    }
}

</style>

</head>

<body>

<div class="container">

<h2>Services</h2>

<div class="grid">

{% for s in services %}
<div class="card">

    {% if s.image %}
        <img src="{{ s.image.url }}">
    {% endif %}

    <div class="card-body">
        <h3>{{ s.name }}</h3>
        <p>{{ s.title }}</p>

        <a href="{% url 'service_detail' s.id %}" class="btn">
            View Details
        </a>
    </div>

</div>
{% endfor %}

</div>

</div>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Service</title>

<style>
:root {
    --primary:#2563eb;
    --bg:#f1f5f9;
    --text:#1e293b;
    --muted:#64748b;
    --border:#e2e8f0;
}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:480px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h2{
    text-align:center;
    margin-bottom:5px;
    font-size:22px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:20px;
    font-size:14px;
}

/* Inputs */
input,select,textarea{
    width:100%;
    padding:12px;
    margin-top:14px;
    border-radius:10px;
    border:1px solid var(--border);
    font-size:15px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:18px;
    background:var(--primary);
    border:none;
    color:#fff;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

/* Steps */
.hidden{display:none;}

/* OTP */
.otp-wrap{
    display:flex;
    gap:10px;
}
.otp-box{
    flex:1;
    height:50px;
    text-align:center;
    font-size:20px;
}

/* Message */
.msg{
    display:none;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    text-align:center;
}
.msg.error{background:#fee2e2;color:red;display:block;}
.msg.success{background:#dcfce7;color:green;display:block;}

/* REGISTER TEXT */
.register-text{
    display:none;
    text-align:center;
    margin-top:8px;
    font-size:14px;
    color:#475569;
}

.register-text a{
    color:var(--primary);
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
}

.register-text a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Book Home Service</h2>
<p class="subtitle">Fast • Reliable • Doorstep Service</p>

<div id="msg" class="msg"></div>

<!-- REGISTER TEXT -->
<div id="registerText" class="register-text">
Not registered? <a onclick="goRegister()">Register here</a>
</div>

<!-- STEP 1 -->
<div id="step1">
<label>Phone Number</label>
<input type="tel" id="phone" placeholder="Enter phone number">
<button onclick="sendOTP()">Send OTP</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
<label>Enter OTP</label>

<div class="otp-wrap">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
<input class="otp-box" maxlength="1">
</div>

<button onclick="verifyOTP()">Verify OTP</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">

<label>Category</label>
<select id="category" onchange="loadServices()">
<option value="">Select Category</option>
{% for c in categories %}
<option value="{{ c.id }}">{{ c.title }}</option>
{% endfor %}
</select>

<label>Service</label>
<select id="service">
<option value="">Select Service</option>
</select>

<label>Problem</label>
<textarea id="problem" placeholder="Describe your issue"></textarea>

<label>Address</label>
<textarea id="address"></textarea>

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<select id="time">
<option value="09-11">09-11</option>
<option value="11-1">11-1</option>
<option value="1-3">1-3</option>
<option value="3-5">3-5</option>
</select>

<button onclick="bookService()">Confirm Booking</button>

</div>

</div>
</div>

<script>

/* MESSAGE */
function showMsg(text,type){
 let m=document.getElementById("msg");
 m.innerText=text;
 m.className="msg "+type;
}

/* REGISTER REDIRECT */
function goRegister(){
 let phone=document.getElementById("phone").value;
 window.location.href = `/register/?phone=${phone}`;
}

/* CSRF */
function getCSRF(){
 return document.cookie.split('; ')
  .find(r=>r.startsWith('csrftoken='))?.split('=')[1];
}

/* API */
async function api(data){
 let res = await fetch("/book_service/",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "X-CSRFToken":getCSRF()
  },
  body:JSON.stringify(data)
 });
 return res.json();
}

/* STEP 1 */
async function sendOTP(){
 let phone=document.getElementById("phone").value;

 if(!phone) return showMsg("Enter phone","error");

 let d = await api({step:"phone",phone:phone});

 if(d.error){

   showMsg(d.error,"error");

   // 🔥 SHOW TEXT LINK
   if(d.error.toLowerCase().includes("register")){
     document.getElementById("registerText").style.display="block";
   }

   return;
 }

 document.getElementById("registerText").style.display="none";

 showMsg("OTP Sent","success");

 document.getElementById("step1").classList.add("hidden");
 document.getElementById("step2").classList.remove("hidden");
}

/* OTP AUTO */
let boxes=document.querySelectorAll(".otp-box");
boxes.forEach((b,i)=>{
 b.addEventListener("input",()=>{
  if(b.value && i<3) boxes[i+1].focus();
 });
});

/* STEP 2 */
async function verifyOTP(){
 let otp="";
 boxes.forEach(b=>otp+=b.value);

 let d = await api({step:"otp",otp});

 if(d.error) return showMsg(d.error,"error");

 showMsg("Verified","success");

 document.getElementById("step2").classList.add("hidden");
 document.getElementById("step3").classList.remove("hidden");
}

/* LOAD SERVICES */
async function loadServices(){
 let cat=document.getElementById("category").value;

 if(!cat) return;

 let res=await fetch(`/get-services/?category_id=${cat}`);
 let data=await res.json();

 let html='<option value="">Select Service</option>';

 data.services.forEach(s=>{
  html+=`<option value="${s.id}">${s.name}</option>`;
 });

 document.getElementById("service").innerHTML=html;
}

/* STEP 3 */
async function bookService(){

 let category=document.getElementById("category").value;
 let service=document.getElementById("service").value;

 if(!category || !service){
  return showMsg("Select category & service","error");
 }

 let d = await api({
  step:"details",
  category_id:category,
  service_id:service,
  problem:problem.value,
  address:address.value,
  date:date.value,
  time:time.value
 });

 if(d.error) return showMsg(d.error,"error");

 showMsg("Booking Successful","success");

 setTimeout(()=>{ window.location.href="/"; },1500);
}

</script>

</body>
</html>

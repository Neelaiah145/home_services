{% extends "base.html" %}
{% block content %}

<style>

.container {
    max-width: 1000px;
    margin: 30px auto;
}

/* CARD */
.card {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    margin-bottom: 25px;
}

/* TITLE */
h2 {
    margin-bottom: 15px;
}

/* FORM */
.form-group {
    margin-bottom: 12px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

textarea {
    height: 80px;
}

/* BUTTON */
.btn {
    padding: 10px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background: #1d4ed8;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #f8fafc;
    padding: 10px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

tr:hover {
    background: #f9fafb;
}

/* IMAGE */
.thumb {
    width: 60px;
    height: 50px;
    object-fit: cover;
    border-radius: 5px;
}

/* ACTIONS */
.action-btn {
    border: none;
    background: none;
    cursor: pointer;
    margin-right: 8px;
}

.edit { color: #2563eb; }
.delete { color: #dc2626; }

</style>

<div class="container">

<!-- ================= ADD SERVICE ================= -->
<div class="card">

<h2>Add New Service</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="form-group">
<input type="text" name="name" placeholder="Service Name" required>
</div>

<div class="form-group">
<input type="text" name="title" placeholder="Short Title" required>
</div>

<div class="form-group">
<textarea name="description" placeholder="Description" required></textarea>
</div>

<div class="form-group">
<input type="file" name="image" onchange="previewImage(event)">
<div id="preview"></div>
</div>

<button type="submit" class="btn">Create Service</button>

</form>

</div>

<!-- ================= SERVICE TABLE ================= -->
<div class="card">

<h2>All Services</h2>

<table>
<thead>
<tr>
<th style="width:10%">Image</th>
<th style="width:25%">Name</th>
<th style="width:35%">Title</th>
<th style="width:30%">Actions</th>
</tr>
</thead>

<tbody>

{% for s in services %}
<tr>

<td>
{% if s.image %}
<img src="{{ s.image.url }}" class="thumb">
{% else %}
No Image
{% endif %}
</td>

<td>{{ s.name }}</td>
<td>{{ s.title }}</td>

<td>
<a href="{% url 'update_service' s.id %}" class="action-btn edit">Edit</a>

<button onclick="deleteService({{ s.id }})" class="action-btn delete">
Delete
</button>
</td>

</tr>
{% empty %}
<tr>
<td colspan="4" style="text-align:center;">No Services Found</td>
</tr>
{% endfor %}

</tbody>
</table>

</div>

</div>

<script>

/* IMAGE PREVIEW */
function previewImage(event){
    let file = event.target.files[0];
    let preview = document.getElementById("preview");

    if(file){
        let reader = new FileReader();
        reader.onload = function(e){
            preview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:150px; object-fit:cover; margin-top:10px;">`;
        }
        reader.readAsDataURL(file);
    }
}

/* DELETE */
function getCSRF(){
    return "{{ csrf_token }}";
}

function deleteService(id){

    if(!confirm("Delete this service?")) return;

    fetch("/delete-service/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRF()
        },
        body: new URLSearchParams({ id: id })
    })
    .then(res => res.json())
    .then(data=>{
        location.reload();
    });
}

</script>

{% endblock %}

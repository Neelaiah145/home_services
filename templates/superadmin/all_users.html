{% extends "base.html" %}
{% block content %}

<style>

.container {
    max-width: 1100px;
    margin: 30px auto;
}

/* CARD */
.card {
    background: #ffffff;
    padding: 18px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* HEADER */
h2 {
    margin-bottom: 12px;
    font-size: 20px;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
}

/* SEARCH */
.search-box {
    flex: 1;
}

.search-box input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 14px;
}

/* FILTER BUTTONS */
.filters {
    display: flex;
    gap: 6px;
}

.filters button {
    padding: 6px 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    background: #f8fafc;
    cursor: pointer;
    font-size: 13px;
}

.filters button.active {
    background: #2563eb;
    color: #fff;
    border-color: #2563eb;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;   /* 🔥 FIX ALIGNMENT */
}

th, td {
    padding: 10px;
    text-align: left;
    font-size: 14px;
}

/* HEADER */
th {
    background: #f8fafc;
    font-weight: 600;
}

/* ROW */
td {
    border-bottom: 1px solid #f1f5f9;
}

/* HOVER */
tr:hover {
    background: #f9fafb;
}

/* ROLE BADGE */
.badge {
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 11px;
    color: #fff;
    display: inline-block;
}

/* COLORS */
.admin { background: #2563eb; }
.vendor { background: #16a34a; }
.customer { background: #f59e0b; }

</style>

<div class="container">
<div class="card">

<h2>All Users</h2>

<!-- ===== SEARCH + FILTER ===== -->
<div class="top-bar">

    <div class="search-box">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search users..."
            onkeyup="loadUsers()"
        >
    </div>

    <div class="filters">
        <button onclick="setFilter('', this)" class="active">All</button>
        <button onclick="setFilter('admin', this)">Admin</button>
        <button onclick="setFilter('vendor', this)">Vendor</button>
        <button onclick="setFilter('customer', this)">Customer</button>
    </div>

</div>

<!-- ===== TABLE ===== -->
<table>
<thead>
<tr>
<th style="width:25%;">Name</th>
<th style="width:30%;">Email</th>
<th style="width:25%;">Phone</th>
<th style="width:20%;">Role</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>
</div>

<script>

let currentRole = "";

/* SET FILTER */
function setFilter(role, el){
    currentRole = role;

    document.querySelectorAll(".filters button").forEach(btn=>{
        btn.classList.remove("active");
    });

    el.classList.add("active");

    loadUsers();
}

/* LOAD USERS */
function loadUsers(){

    let query = document.getElementById("searchInput").value;

    fetch(`/api/all-users/?q=${query}&role=${currentRole}`)
    .then(res => res.json())
    .then(data => {

        let html = "";

        if(data.users.length === 0){
            html = `<tr><td colspan="4" style="text-align:center;">No Users Found</td></tr>`;
        }

        data.users.forEach(user => {

            html += `
            <tr>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.phone}</td>
                <td>
                    <span class="badge ${user.role}">
                        ${user.role}
                    </span>
                </td>
            </tr>
            `;
        });

        document.getElementById("userTable").innerHTML = html;
    });
}

/* INITIAL LOAD */
window.onload = loadUsers;

/* AUTO REFRESH */
setInterval(loadUsers, 5000);

</script>

{% endblock %}
